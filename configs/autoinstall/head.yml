# Ubuntu autoinstall configuration
# More information can be found here:
# https://canonical-subiquity.readthedocs-hosted.com/en/latest/reference/autoinstall-reference.html

autoinstall:
  version: 1

  interactive-sections:
    - network
    - identity

  locale: "en_US.UTF-8"

  keyboard:
    layout: us
    variant: ""
    toggle: null

  source:
    search_drivers: true
    id: ubuntu-server

  proxy: null

  # Run BEFORE the storage probe. This avoids `probert` deadlocking on
  # stale LVM/RAID/LUKS metadata from a prior install, which presents as
  # "filesystem probe timed out" / "block probing failed" in the logs.
  # See: https://bugs.launchpad.net/subiquity/+bug/2009141
  #
  # Edit DISK below to your actual target (e.g. /dev/nvme0n1, /dev/sda).
  # `|| true` everywhere so a clean disk doesn't fail the install.
  early-commands:
    - |
      # Tear down any auto-activated LVM so probert sees raw partitions.
      vgchange -an || true
      for vg in $(vgs --noheadings -o vg_name 2>/dev/null); do
        vgremove -ff "$vg" || true
      done
      for pv in $(pvs --noheadings -o pv_name 2>/dev/null); do
        pvremove -ff "$pv" || true
      done
      # Stop any md arrays too, just in case.
      mdadm --stop --scan 2>/dev/null || true
      # Wipe signatures from all non-removable disks that aren't the
      # installer USB. Adjust the filter if you need to keep a disk.
      for d in /sys/block/*/removable; do
        name=$(basename "$(dirname "$d")")
        [ "$(cat "$d")" = "0" ] || continue
        case "$name" in loop*|sr*|ram*|zram*|dm-*) continue ;; esac
        wipefs -a "/dev/$name" || true
      done

  # https://canonical-subiquity.readthedocs-hosted.com/en/latest/reference/autoinstall-reference.html#storage
  # https://curtin.readthedocs.io/en/latest/topics/storage.html
  storage:
    config:
      # DISKS
      - type: disk
        id: disk0
        match:
          size: smallest
        ptable: gpt
        wipe: superblock-recursive
        preserve: false
        grub_device: false


      # PARTITIONS

      ## EFI at /boot/efi
      - type: partition
        id: efi-partition
        number: 1
        size: 1G
        device: disk0
        flag: boot
        preserve: false
        grub_device: true
        wipe: superblock

      - type: format
        id: efi-format
        fstype: fat32
        volume: efi-partition
        preserve: false

      # boot at /boot
      - type: partition
        id: boot-partition
        number: 2
        size: 1G
        device: disk0
        preserve: false
        grub_device: false
        wipe: superblock

      - type: format
        id: boot-format
        fstype: ext4
        volume: boot-partition
        preserve: false

      # Swap
      - type: partition
        id: swap-partition
        number: 3
        size: 8G
        device: disk0
        preserve: false
        grub_device: false
        wipe: superblock

      - type: format
        id: swap-format
        fstype: swap
        volume: swap-partition
        preserve: false

      # LVM physical volume
      - type: partition
        id: pv0
        number: 4
        size: 500G
        device: disk0
        preserve: false
        grub_device: false
        wipe: superblock

      - type: lvm_volgroup
        id: vg0
        name: vg0
        devices:
          - pv0
        preserve: false

      # Logical volumes
      - type: lvm_partition
        id: root-lv
        name: root-lv
        volgroup: vg0
        size: 50G
        preserve: false
        wipe: superblock

      - type: format
        id: root-format
        fstype: ext4
        volume: root-lv
        preserve: false


      - type: lvm_partition
        id: ihome-lv
        name: ihome-lv
        volgroup: vg0
        size: 350G
        preserve: false
        wipe: superblock

      - type: format
        id: ihome-format
        fstype: ext4
        volume: ihome-lv
        preserve: false

      - type: lvm_partition
        id: data-lv
        name: data-lv
        volgroup: vg0
        size: 45G
        preserve: false
        wipe: superblock

      - type: format
        id: data-format
        fstype: ext4
        volume: data-lv
        preserve: false


      # MOUNTS

      - type: mount
        id: efi-mount
        path: /boot/efi
        device: efi-format

      - type: mount
        id: boot-mount
        path: /boot
        device: boot-format

      - type: mount
        id: swap-mount
        path: ''
        device: swap-format

      - type: mount
        id: root-mount
        path: /
        device: root-format

      - type: mount
        id: ihome-mount
        path: /ihome
        device: ihome-format

      - type: mount
        id: data-mount
        path: /data
        device: data-format

  ssh:
    install-server: true
    authorized-keys: []
    allow-pw: false

  drivers:
    install: true

  oem:
    install: false

  packages:
    - build-essential
    - git
    - nfs-common
    - nfs-kernel-server
    - curl
    - wget
    - cmake
    - automake
    - autoconf
    - software-properties-common
    - python3
    - python3-pip
    - python3-venv
    - htop
    - tmux
    - tree
    - net-tools
    - iproute2
    - vim
    - nano
    - rsync

  timezone: "America/New_York"

  updates: all

  shutdown: reboot
