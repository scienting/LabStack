---
- name: Set timezone
  community.general.timezone:
    name: "{{ cluster_timezone }}"

- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Ensure /etc/hosts has an entry for ourselves
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: "^127\\.0\\.1\\.1\\s"
    line: "127.0.1.1 {{ inventory_hostname }}.{{ cluster_domain }} {{ inventory_hostname }}"
    state: present

- name: Install base packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Configure chrony for time sync
  ansible.builtin.template:
    src: chrony.conf.j2
    dest: /etc/chrony/chrony.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart chrony

- name: Enable chrony
  ansible.builtin.systemd:
    name: chrony
    enabled: true
    state: started

- name: Configure unattended-upgrades for security updates only
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
    owner: root
    group: root
    mode: "0644"

- name: Ensure unattended-upgrades is enabled
  ansible.builtin.systemd:
    name: unattended-upgrades
    enabled: true
    state: started

- name: Drop SSH hardening config
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/10-hardening.conf
    content: |
      # Managed by Ansible (roles/common). Do not edit by hand.
      PermitRootLogin no
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      ChallengeResponseAuthentication no
      PermitEmptyPasswords no
      X11Forwarding no
    owner: root
    group: root
    mode: "0644"
  notify: Restart sshd

- name: Set ufw default policies
  community.general.ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - { direction: incoming, policy: "{{ common_firewall_default_incoming }}" }
    - { direction: outgoing, policy: "{{ common_firewall_default_outgoing }}" }
  when: common_firewall_enabled

- name: Apply ufw rules
  community.general.ufw:
    rule: "{{ item.rule }}"
    port: "{{ item.port }}"
    proto: "{{ item.proto | default(omit) }}"
    src: "{{ item.src | default(omit) }}"
    comment: "{{ item.comment | default(omit) }}"
  loop: "{{ common_firewall_rules }}"
  when: common_firewall_enabled

- name: Enable ufw
  community.general.ufw:
    state: enabled
  when: common_firewall_enabled
